# NaturalSkill Configuration
# All configurations for categories, branches, and custom effects.

# Material to use for decoration in GUIs
gui:
  decorations:
    filler:
      material: "GRAY_STAINED_GLASS_PANE"
      name: " "
    back_button:
      material: "ARROW"
      name: "&cBack to Categories"
      slot: 49

# The 5 default categories. Admin can add new ones here.
# Main menu layout slots (0-53):
# 11: Intelligence, 13: Strength, 15: Agility, 29: Psychology, 33: Communication
categories:
  intelligence:
    name: "&b&lIntelligence"
    icon: "BOOK"
    slot: 11
    lore:
      - "&7Meningkatkan kapasitas berpikir,"
      - "&7logika, dan pemahaman Anda."
      - ""
      - "&eKlik untuk membuka cabang skill!"
    branches:
      iq_1:
        name: "&eIQ I"
        icon: "ENCHANTED_BOOK"
        slot: 20
        cost: 10
        lore:
          - "&7Meningkatkan kecerdasan intelektual."
          - ""
          - "&7Biaya: &e%cost% Skill Points"
          - "&7Status: %status%"
        effects:
          - "[console] give %player% diamond 5"
          - "[message] &a&l[NaturalSkill] &fKamu berhasil membuka &eIQ I&f! Kamu mendapatkan &b5 Diamond&f!"
          - "[sound] ENTITY_PLAYER_LEVELUP"
      iq_2:
        name: "&eIQ II"
        icon: "ENCHANTED_BOOK"
        slot: 21
        cost: 25
        prerequisite: "iq_1"
        lore:
          - "&7Meningkatkan kecerdasan intelektual lebih lanjut."
          - "&7Membutuhkan: &6IQ I"
          - ""
          - "&7Biaya: &e%cost% Skill Points"
          - "&7Status: %status%"
        effects:
          - "[console] effect give %player% night_vision infinite 0 true"
          - "[message] &a&l[NaturalSkill] &fKamu berhasil membuka &eIQ II&f! Kamu mendapatkan efek &eNight Vision&f!"
          - "[sound] ENTITY_PLAYER_LEVELUP"
      eq_1:
        name: "&dEQ I"
        icon: "WRITABLE_BOOK"
        slot: 23
        cost: 12
        lore:
          - "&7Mengendalikan emosi dan interaksi."
          - ""
          - "&7Biaya: &e%cost% Skill Points"
          - "&7Status: %status%"
        effects:
          - "[vault] give 1000"
          - "[message] &a&l[NaturalSkill] &fKamu berhasil membuka &dEQ I&f! Kamu mendapatkan &a$1,000&f!"
          - "[sound] ENTITY_PLAYER_LEVELUP"

  strength:
