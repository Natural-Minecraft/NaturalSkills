        - "&7- Peluang Double Panenan: &e%level% x 0.5% &7(Saat ini: &e%percent%%&7)"
    fishing:
      name: "&b&lPemancing (Fishing)"
      icon: "FISHING_ROD"
      slot: 23
      lore:
        - "&7Meningkatkan keahlian memancing ikan."
        - "&7Level: &e%level% &7/ &e%max_level%"
        - "&7Progress: &b%xp% &7/ &b%req_xp% XP &7(%percent%%)"
