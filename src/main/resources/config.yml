# NaturalSkill Configuration
# All configurations for categories, branches, and custom effects.

# Material to use for decoration in GUIs
gui:
  decorations:
    filler:
      material: "GRAY_STAINED_GLASS_PANE"
      name: " "
    back_button:
      material: "ARROW"
      name: "&cBack to Categories"
      slot: 49

# The 5 default categories. Admin can add new ones here.
# Main menu layout slots (0-53):
# 11: Intelligence, 13: Strength, 15: Agility, 29: Psychology, 33: Communication
categories:
  intelligence:
    name: "&b&lIntelligence"
    icon: "BOOK"
    slot: 20
    lore:
      - "&7Meningkatkan kapasitas berpikir,"
      - "&7logika, dan pemahaman Anda."
      - ""
      - "&eKlik untuk membuka cabang skill!"
    branches:
      iq_1:
        name: "&eIQ I"
        icon: "ENCHANTED_BOOK"
        slot: 20
        cost: 10
        lore:
          - "&7Meningkatkan kecerdasan intelektual."
          - ""
          - "&7Biaya: &e%cost% Skill Points"
          - "&7Status: %status%"
        effects:
          - "[console] give %player% diamond 5"
          - "[message] &a&l[NaturalSkill] &fKamu berhasil membuka &eIQ I&f! Kamu mendapatkan &b5 Diamond&f!"
          - "[sound] ENTITY_PLAYER_LEVELUP"
      iq_2:
        name: "&eIQ II"
        icon: "ENCHANTED_BOOK"
        slot: 21
        cost: 25
        prerequisite: "iq_1"
        lore:
          - "&7Meningkatkan kecerdasan intelektual lebih lanjut."
          - "&7Membutuhkan: &6IQ I"
          - ""
          - "&7Biaya: &e%cost% Skill Points"
          - "&7Status: %status%"
        effects:
          - "[console] effect give %player% night_vision infinite 0 true"
          - "[message] &a&l[NaturalSkill] &fKamu berhasil membuka &eIQ II&f! Kamu mendapatkan efek &eNight Vision&f!"
          - "[sound] ENTITY_PLAYER_LEVELUP"
      eq_1:
        name: "&dEQ I"
        icon: "WRITABLE_BOOK"
        slot: 23
        cost: 12
        lore:
          - "&7Mengendalikan emosi dan interaksi."
          - ""
          - "&7Biaya: &e%cost% Skill Points"
          - "&7Status: %status%"
        effects:
          - "[vault] give 1000"
          - "[message] &a&l[NaturalSkill] &fKamu berhasil membuka &dEQ I&f! Kamu mendapatkan &a$1,000&f!"
          - "[sound] ENTITY_PLAYER_LEVELUP"

  strength:
    name: "&c&lStrength"
    icon: "IRON_SWORD"
    slot: 22
    lore:
      - "&7Meningkatkan kekuatan fisik,"
      - "&7daya tahan, dan daya serang."
      - ""
      - "&eKlik untuk membuka cabang skill!"
    branches:
      power_1:
        name: "&cPower I"
        icon: "STONE_SWORD"
        slot: 20
        cost: 15
        lore:
          - "&7Meningkatkan daya serang fisik."
          - ""
          - "&7Biaya: &e%cost% Skill Points"
          - "&7Status: %status%"
        effects:
          - "[console] effect give %player% strength 600 0 true"
          - "[message] &a&l[NaturalSkill] &fKamu berhasil membuka &cPower I&f! Kamu mendapatkan efek &cStrength I &fselama 10 menit!"
          - "[sound] ENTITY_PLAYER_LEVELUP"
      durability_1:
        name: "&6Durability I"
        icon: "IRON_CHESTPLATE"
        slot: 22
        cost: 15
        lore:
          - "&7Meningkatkan daya tahan tubuh."
          - ""
          - "&7Biaya: &e%cost% Skill Points"
          - "&7Status: %status%"
        effects:
          - "[console] effect give %player% resistance 600 0 true"
          - "[message] &a&l[NaturalSkill] &fKamu berhasil membuka &6Durability I&f! Kamu mendapatkan efek &9Resistance I &fselama 10 menit!"
          - "[sound] ENTITY_PLAYER_LEVELUP"

  agility:
    name: "&a&lAgility"
    icon: "FEATHER"
    slot: 24
    lore:
      - "&7Meningkatkan kelincahan, kecepatan,"
      - "&7dan refleks Anda."
      - ""
      - "&eKlik untuk membuka cabang skill!"
    branches:
      speed_1:
        name: "&aSpeed I"
        icon: "LEATHER_BOOTS"
        slot: 20
        cost: 10
        lore:
          - "&7Meningkatkan kecepatan lari."
          - ""
          - "&7Biaya: &e%cost% Skill Points"
          - "&7Status: %status%"
        effects:
          - "[console] effect give %player% speed 600 0 true"
          - "[message] &a&l[NaturalSkill] &fKamu berhasil membuka &aSpeed I&f! Kecepatan Anda meningkat!"
          - "[sound] ENTITY_PLAYER_LEVELUP"

  psychology:
    name: "&5&lPsychology"
    icon: "BREWING_STAND"
    slot: 29
    lore:
      - "&7Meningkatkan ketahanan mental,"
      - "&7fokus, dan kontrol pikiran."
      - ""
      - "&eKlik untuk membuka cabang skill!"
    branches:
      focus_1:
        name: "&5Focus I"
        icon: "ENDER_EYE"
        slot: 22
        cost: 20
        lore:
          - "&7Meningkatkan fokus mental."
          - ""
          - "&7Biaya: &e%cost% Skill Points"
          - "&7Status: %status%"
        effects:
          - "[mcmmo] herbalism 1000"
          - "[message] &a&l[NaturalSkill] &fKamu berhasil membuka &5Focus I&f! McMMO Herbalism XP bertambah &d1000&f!"
          - "[sound] ENTITY_PLAYER_LEVELUP"

  communication:
    name: "&e&lCommunication"
    icon: "WRITTEN_BOOK"
    slot: 33
    lore:
      - "&7Meningkatkan karisma dan"
      - "&7kemampuan bernegosiasi."
      - ""
      - "&eKlik untuk membuka cabang skill!"
    branches:
      charisma_1:
        name: "&eCharisma I"
        icon: "GOLDEN_CARROT"
        slot: 22
        cost: 15
        lore:
          - "&7Meningkatkan daya tarik sosial."
          - ""
          - "&7Biaya: &e%cost% Skill Points"
          - "&7Status: %status%"
        effects:
          - "[vault] give 500"
          - "[mmoitems] SWORD EXCALIBUR 1"
          - "[message] &a&l[NaturalSkill] &fKamu berhasil membuka &eCharisma I&f! Kamu mendapatkan &a$500 &fdan item custom &eExcalibur&f!"
          - "[sound] ENTITY_PLAYER_LEVELUP"

# ========================================================
# Sistem Progresi & Bakat (AuraSkills Style) Configuration
# ========================================================

gui:
  decorations:
    bakat_button:
      material: "GOLDEN_HOE"
      name: "&6&lKeahlian Bakat &7[Klik]"
      slot: 31
      lore:
        - "&7Bakat khusus yang didapat dari"
        - "&7kegiatan sehari-hari (Tebang Kayu,"
        - "&7Menambang, Berenang, Memancing, dll)."
        - ""
        - "&eKlik untuk melihat perkembangan bakat!"
  bakat-title: "&0Bakat Pemain"

progression:
  max-level: 50
  bakat-max-level: 50
  skill-max-level: 255
  points-per-level: 1
  xp-curve:
    base: 100.0
    multiplier: 50.0
    exponent: 1.8

  # Main Skill categories scaling passive attributes
  skills:
    strength:
      name: "Strength"
      effects:
        per_level:
          damage_percent: 0.005 # +0.5% damage per level
          damage_flat: 0.1 # +0.1 flat damage per level
        levels:
          10:
            attributes:
              GENERIC_MAX_HEALTH: 4.0 # +2 hearts (1 heart = 2.0 health)
            message: "&6&l[Level Up] &aStrength Level 10: &fMendapatkan &e+2 Max Hearts&f!"
          20:
            attributes:
              GENERIC_MAX_HEALTH: 8.0 # +4 hearts
            message: "&6&l[Level Up] &aStrength Level 20: &fMendapatkan &e+4 Max Hearts&f!"
          30:
            attributes:
              GENERIC_MAX_HEALTH: 12.0 # +6 hearts
            message: "&6&l[Level Up] &aStrength Level 30: &fMendapatkan &e+6 Max Hearts&f!"
          40:
            attributes:
              GENERIC_MAX_HEALTH: 16.0 # +8 hearts
            message: "&6&l[Level Up] &aStrength Level 40: &fMendapatkan &e+8 Max Hearts&f!"
          50:
            attributes:
              GENERIC_MAX_HEALTH: 20.0 # +10 hearts
            message: "&6&l[Level Up] &aStrength Level 50: &fMendapatkan &e+10 Max Hearts&f!"
    agility:
      name: "Agility"
      effects:
        per_level:
          GENERIC_MOVEMENT_SPEED: 0.001 # +0.1% movement speed per level
    intelligence:
      name: "Intelligence"
    psychology:
      name: "Psychology"
    communication:
      name: "Communication"

  # Bakat (Talent) definitions
  bakat:
    woodcutting:
      name: "&a&lPenebang Pohon (Woodcutting)"
      icon: "IRON_AXE"
      slot: 20
      lore:
        - "&7Meningkatkan keahlian menebang pohon."
        - "&7Level: &e%level% &7/ &e%max_level%"
        - "&7Progress: &b%xp% &7/ &b%req_xp% XP &7(%percent%%)"
        - "&7%progress_bar%"
        - ""
        - "&eSumber XP:"
        - "&7- Oak/Spruce/Birch Logs: &a+5.0 XP"
        - "&7- Jungle/Acacia/Dark Oak Logs: &a+6.0 XP"
        - ""
        - "&aEfek Pasif:"
        - "&7- Peluang Double Logs: &e%level% x 0.5% &7(Saat ini: &e%percent%%&7)"
    mining:
      name: "&e&lPenambang (Mining)"
      icon: "IRON_PICKAXE"
      slot: 21
      lore:
        - "&7Meningkatkan keahlian menambang bijih & batu."
        - "&7Level: &e%level% &7/ &e%max_level%"
        - "&7Progress: &b%xp% &7/ &b%req_xp% XP &7(%percent%%)"
        - "&7%progress_bar%"
        - ""
        - "&eSumber XP:"
