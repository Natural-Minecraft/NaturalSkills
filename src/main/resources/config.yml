        - ""
        - "&aEfek Pasif:"
        - "&7- Tambahan Speed Berenang: &e%level% x 0.1% &7(Saat ini: &e%percent%%&7)"
    arsitek:
      name: "&9&lArsitek (Builder)"
      icon: "BRICKS"
      slot: 29
      lore:
        - "&7Keahlian seorang pembangun sejati."
        - "&7Level: &e%level% &7/ &e%max_level%"
        - "&7Progress: &b%xp% &7/ &b%req_xp% XP &7(%percent%%)"
