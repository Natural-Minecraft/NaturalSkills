        - "&7- Besi / Emas Ore: &a+8.0 XP"
        - "&7- Berlian / Emerald Ore: &a+25.0 XP"
        - ""
        - "&aEfek Pasif:"
        - "&7- Peluang Double Ores: &e%level% x 0.5% &7(Saat ini: &e%percent%%&7)"
    farming:
      name: "&6&lPetani (Farming)"
      icon: "IRON_HOE"
      slot: 22
      lore:
        - "&7Meningkatkan keahlian memanen tanaman."
        - "&7Level: &e%level% &7/ &e%max_level%"
        - "&7Progress: &b%xp% &7/ &b%req_xp% XP &7(%percent%%)"
